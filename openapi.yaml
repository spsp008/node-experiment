openapi: 3.0.3
info:
  title: Network Dashboard API
  description: >-
    REST API for the Network Dashboard — a real-time
    Organization → Network (NodeGroup) → Device (Node) → Ports & Usage
    monitoring platform.

    Networks and devices support server-side **name search** (`q`) and
    **pagination** (`page` / `per_page`). Live status and usage updates are
    delivered separately over Action Cable (`/cable`, `DeviceChannel`) — see the
    `x-websocket` section below; those messages are not part of the REST spec.
  version: 1.1.0
servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Organizations
  - name: Networks
  - name: Devices
  - name: Usage
  - name: System

paths:
  /api/organizations/{id}:
    get:
      tags: [Organizations]
      summary: Get an organization with a searched, paginated page of networks
      description: >-
        Returns the organization plus one page of its networks, each with
        query-time device health computed in SQL. Supports name search and
        pagination via `q`, `page`, and `per_page`. This is also the endpoint the
        server-rendered shell embeds (page 1, no query) for first paint.
      operationId: showOrganization
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Organization with a page of networks and pagination metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/networks/{id}/devices:
    get:
      tags: [Networks]
      summary: List devices in a network (searchable, paginated)
      description: >-
        Returns the network (NodeGroup) plus one page of its member devices.
        Supports name search and pagination via `q`, `page`, and `per_page`.
      operationId: networkDevices
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Network with a page of devices and pagination metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkDevices'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/nodes/{id}:
    get:
      tags: [Devices]
      summary: Get device detail with port summary
      description: >-
        Returns device detail, a port summary, and the port list. As a side
        effect, enqueues an immediate `PollDeviceUsageJob` for this device so a
        fresh usage sample is broadcast shortly after.
      operationId: showNode
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Device detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/nodes/{node_id}/device_usages:
    get:
      tags: [Usage]
      summary: Get time-bounded usage samples for a device
      description: >-
        Returns usage rows within a time window, ordered most-recent first and
        capped at 5000 rows. Defaults to the last 24 hours when `from`/`to` are
        omitted. Used to seed the usage chart; live points then arrive over the
        WebSocket.
      operationId: deviceUsages
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: integer
          description: Device (Node) id.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: >-
            Window start (inclusive). Any value parseable by the server's time
            zone. Defaults to 24 hours ago. Unparseable values are ignored.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Window end (inclusive). Defaults to now.
      responses:
        '200':
          description: Usage samples within the window (max 5000, newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceUsage'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/health:
    get:
      tags: [System]
      summary: Health probe
      operationId: health
      responses:
        '200':
          description: Service is healthy.

  /api/internal_component:
    get:
      tags: [System]
      summary: Demo internal-component metrics
      operationId: internalComponent
      responses:
        '200':
          description: Demo metrics payload.

# Informational: real-time channel is not REST, documented here for completeness.
x-websocket:
  endpoint: /cable
  channel: DeviceChannel
  subscribe:
    identifier: '{ "channel": "DeviceChannel", "node_id": <id> }'
    note: Unknown node ids are rejected.
  messages:
    - type: usage
      description: >-
        One batched frame per poll carrying every newly-inserted usage point.
      example:
        type: usage
        usages:
          - { id: 1, uplink: 1, bytes: 2969, recorded_at: '2026-07-01T10:20:51Z' }
          - { id: 2, uplink: 2, bytes: 833, recorded_at: '2026-07-01T10:20:51Z' }
    - type: node
      description: Refreshed device + port snapshot after a poll updates status.

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
    QueryParam:
      name: q
      in: query
      required: false
      schema:
        type: string
      description: Case-insensitive name search (ILIKE). Omitted/blank returns all.
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 1-based page number. Values below 1 are clamped to 1.
    PerPageParam:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 12
      description: Page size. Defaults to 12, clamped to a maximum of 100.

  responses:
    NotFound:
      description: Record not found.

  schemas:
    Pagination:
      type: object
      description: Pagination metadata for a list response.
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
        total_pages:
          type: integer

    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        networks:
          type: array
          description: One page of networks (see networks_pagination).
          items:
            $ref: '#/components/schemas/NetworkSummary'
        networks_pagination:
          $ref: '#/components/schemas/Pagination'

    NetworkSummary:
      type: object
      description: A network (NodeGroup) with health derived from its devices at query time.
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
          nullable: true
        device_count:
          type: integer
        type:
          type: string
          description: STI type, e.g. RouterGroup or SwitchGroup.
          nullable: true
        device_health:
          type: string
          enum: [all_online, all_offline, partial_offline, unknown]
        online_devices:
          type: integer
        offline_devices:
          type: integer
        unknown_devices:
          type: integer

    NetworkDevices:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
          nullable: true
        devices:
          type: array
          description: One page of devices (see pagination).
          items:
            $ref: '#/components/schemas/DeviceSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    DeviceSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          description: STI type, e.g. Router or Switch.
          nullable: true
        status:
          type: string
          nullable: true
        ip:
          type: string
          nullable: true
        mac:
          type: string
          nullable: true

    DeviceDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        ip:
          type: string
          nullable: true
        mac:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        network:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        usage:
          type: object
          description: Port summary counts.
          properties:
            total_ports:
              type: integer
            connected_ports:
              type: integer
            disconnected_ports:
              type: integer
        ports:
          type: array
          items:
            $ref: '#/components/schemas/Port'

    Port:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Interface name, e.g. WAN1.
        status:
          type: string
          description: e.g. "connected".

    DeviceUsage:
      type: object
      properties:
        id:
          type: integer
        uplink:
          type: integer
          description: Uplink index; surfaced in the UI as WAN 1 / WAN 2.
        bytes:
          type: integer
          format: int64
        recorded_at:
          type: string
          format: date-time
